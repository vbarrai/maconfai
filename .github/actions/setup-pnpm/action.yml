name: Setup pnpm
description: Install Node.js and pnpm via corepack with dependency caching

inputs:
  node-version:
    description: Node.js version
    default: '22'
  registry-url:
    description: npm registry URL (for publishing)
    required: false

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
    - run: corepack enable
      shell: bash
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}
    - run: pnpm install --frozen-lockfile
      shell: bash
