name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm prettier
      - run: pnpm lint
      - run: pnpm knip

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Restore tsbuildinfo cache
        uses: actions/cache@v4
        with:
          path: .tsbuildinfo
          key: tsbuildinfo-${{ hashFiles('src/**/*.ts', 'tsconfig.json') }}
          restore-keys: tsbuildinfo-
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm test -- --run

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-format, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm build

  version-check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version availability on npm
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "maconfai@$PKG_VERSION" version 2>/dev/null; then
            echo "::error::Version $PKG_VERSION is already published on npm — bump the version in package.json before merging"
            exit 1
          fi
          echo "Version $PKG_VERSION is available on npm"
