name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prettier
      - run: pnpm lint
      - run: pnpm knip

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore tsbuildinfo cache
        uses: actions/cache@v4
        with:
          path: .tsbuildinfo
          key: tsbuildinfo-${{ hashFiles('src/**/*.ts', 'tsconfig.json') }}
          restore-keys: tsbuildinfo-
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --run

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-format, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build and extract size
        id: build
        run: |
          BUILD_OUTPUT=$(pnpm build 2>&1)
          echo "$BUILD_OUTPUT"
          SIZE=$(echo "$BUILD_OUTPUT" | grep -oP '[\d.]+ kB min\+gzipped' | head -1)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
      - name: Update build size badge in README
        if: github.ref == 'refs/heads/main'
        env:
          SIZE: ${{ steps.build.outputs.size }}
        run: |
          ENCODED_SIZE=$(echo "$SIZE" | sed 's/ /%20/g; s/+/%2B/g')
          sed -i "s|img.shields.io/badge/build%20size-.*-blue|img.shields.io/badge/build%20size-${ENCODED_SIZE}-blue|" README.md
          if git diff --quiet README.md; then
            echo "Badge is already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update build size badge to ${SIZE}"
            git push
          fi

  version-check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version availability on npm
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "maconfai@$PKG_VERSION" version 2>/dev/null; then
            echo "::error::Version $PKG_VERSION is already published on npm — bump the version in package.json before merging"
            exit 1
          fi
          echo "Version $PKG_VERSION is available on npm"
