name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm prettier
      - run: pnpm lint
      - run: pnpm knip

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Restore tsbuildinfo cache
        uses: actions/cache@v4
        with:
          path: .tsbuildinfo
          key: tsbuildinfo-${{ hashFiles('src/**/*.ts', 'tsconfig.json') }}
          restore-keys: tsbuildinfo-
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm coverage
      - name: Upload coverage summary
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-format, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Build and extract size
        id: build
        run: |
          BUILD_OUTPUT=$(pnpm build 2>&1)
          echo "$BUILD_OUTPUT"
          SIZE=$(echo "$BUILD_OUTPUT" | grep -oP '[\d.]+ kB min\+gzipped' | head -1)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
      - name: Download coverage summary
        if: github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v4
        with:
          name: coverage-summary
          path: coverage
      - name: Update badges in README
        if: github.ref == 'refs/heads/main'
        env:
          SIZE: ${{ steps.build.outputs.size }}
        run: |
          # Update build size badge
          ENCODED_SIZE=$(echo "$SIZE" | sed 's/ /%20/g; s/+/%2B/g')
          sed -i "s|img.shields.io/badge/build%20size-.*-blue|img.shields.io/badge/build%20size-${ENCODED_SIZE}-blue|" README.md

          # Update coverage badge
          COVERAGE=$(node -p "JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8')).total.lines.pct")
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          sed -i "s|img.shields.io/badge/coverage-.*|img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR})|" README.md

          if git diff --quiet README.md; then
            echo "Badges are already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update badges (build: ${SIZE}, coverage: ${COVERAGE}%)"
            git push
          fi

  version-check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version availability on npm
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "maconfai@$PKG_VERSION" version 2>/dev/null; then
            echo "::error::Version $PKG_VERSION is already published on npm — bump the version in package.json before merging"
            exit 1
          fi
          echo "Version $PKG_VERSION is available on npm"
